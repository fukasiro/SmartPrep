frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    # 👇 ここから3行を書き足します！
    defaults:
      run:
        working-directory: ./front
    # 👆 ここまで
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install frontend dependencies
        run: npm ci               # 💡「cd front」は消してこれだけでOK
      - name: Build frontend
        run: npm run build         # 💡「cd front」は消してこれだけでOK